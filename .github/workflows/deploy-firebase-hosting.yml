# Build and deploy to Firebase Hosting when race data CSVs change on main.
# Requires repo secret: FIREBASE_TOKEN (from `firebase login:ci` on your machine).

name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "public/data/**"
  workflow_dispatch:

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Use Node 24 for checkout/setup-node (avoids Node 20 deprecation warning on runners)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy hosting (includes Vite build via firebase.json predeploy)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --non-interactive --project f1-dashboard-420f9
